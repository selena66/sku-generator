<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SKU Generator</title>
<style>
    body { font-family: Arial; padding: 20px; max-width: 600px; margin: auto; }

    .row { display: flex; align-items: center; margin-bottom: 15px; }
    .label { width: 140px; }

    select, input {
        width: 80%;
        padding: 8px;
        font-size: 16px;
        box-sizing: border-box;
    }

    .color-wrapper {
        display: flex;
        width: 80%;
    }

    .color-select { width: 80%; }
    .color-hex {
        width: 20%;
        border: 1px solid #ccc;
        background: #eee;
    }

    .error-field {
        border: 3px solid red !important;
        animation: blinkError 0.6s ease-in-out 2;
    }

    @keyframes blinkError {
        0% { background: #ffe5e5; }
        50% { background: white; }
        100% { background: #ffe5e5; }
    }

    .warning-field {
        border: 2px solid orange !important;
    }

    .highlight-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
    }

    .highlight-yellow {
        background: rgba(255, 230, 128, 0.6);
        animation: fadeOut 2s forwards;
    }

    .highlight-red {
        background: rgba(255, 0, 0, 0.4);
        animation: fadeOut 2s forwards;
    }

    @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
    }
